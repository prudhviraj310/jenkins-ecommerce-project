name: Full CI-CD with SonarQube

on:
  push:
    branches: [ "main" ]

jobs:
  sonar-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  build-and-push:
    needs: sonar-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build & Push Images
        run: |
          # Use gh-latest tag to keep these separate from Jenkins images
          docker build -t prudhviraj310/ecommerce-backend:gh-latest -f Dockerfile.backend .
          
          # Point the Frontend to the GitHub Backend port (5001)
          docker build --build-arg REACT_APP_API_URL=http://${{ secrets.EC2_PUBLIC_IP }}:5001 -t prudhviraj310/ecommerce-frontend:gh-latest -f Dockerfile.frontend .
          
          docker push prudhviraj310/ecommerce-backend:gh-latest
          docker push prudhviraj310/ecommerce-frontend:gh-latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Create a separate directory for GitHub Actions files
            mkdir -p ~/gh_actions_project
            cd ~/gh_actions_project
            
            # 2. Stop and remove only the GitHub version if it was already running
            docker rm -f gh-frontend gh-backend gh-mysql || true
            
            # 3. Pull fresh images to ensure we don't use old cached ones
            docker pull prudhviraj310/ecommerce-backend:gh-latest
            docker pull prudhviraj310/ecommerce-frontend:gh-latest
            
            # 4. Start the GitHub version with UNIQUE names and ports
            docker run -d --name gh-mysql -e MYSQL_ROOT_PASSWORD=root mysql:8.0 || true
            
            # Backend: External 5001 -> Internal 5000
            docker run -d --name gh-backend \
              -p 5001:5000 \
              prudhviraj310/ecommerce-backend:gh-latest
            
            # Frontend: External 3001 -> Internal 80 (Crucial for Nginx images)
            docker run -d --name gh-frontend \
              -p 3001:80 \
              prudhviraj310/ecommerce-frontend:gh-latest