name: Full CI-CD with SonarQube

on:
  push:
    branches: [ "main" ]

jobs:
  sonar-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  build-and-push:
    needs: sonar-scan # Build ONLY starts if Sonar passes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build & Push Images
        run: |
          docker build -t prudhviraj310/ecommerce-backend:latest -f Dockerfile.backend .
          docker build --build-arg REACT_APP_API_URL=http://${{ secrets.EC2_PUBLIC_IP }}:5000 -t prudhviraj310/ecommerce-frontend:latest -f Dockerfile.frontend .
          docker push prudhviraj310/ecommerce-backend:latest
          docker push prudhviraj310/ecommerce-frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/project_e_commerce || mkdir ~/project_e_commerce
            # Pull the fresh images and restart using your compose file
            docker compose pull
            docker compose up -d --force-recreate