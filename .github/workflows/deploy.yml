name: Full CI-CD with SonarQube

on:
  push:
    branches: [ "main" ]

jobs:
  sonar-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  build-and-push:
    needs: sonar-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build & Push Images
        run: |
          # Build Backend
          docker build -t prudhviraj310/ecommerce-backend:gh-latest -f Dockerfile.backend .
          
          # Build Frontend - CRITICAL: Use single quotes for the URL and Key
          docker build \
            --build-arg REACT_APP_API_URL='http://${{ secrets.EC2_PUBLIC_IP }}:5001/api' \
            --build-arg REACT_APP_STRIPE_KEY='${{ secrets.STRIPE_PUBLISHABLE_KEY }}' \
            -t prudhviraj310/ecommerce-frontend:gh-latest -f Dockerfile.frontend .
          
          docker push prudhviraj310/ecommerce-backend:gh-latest
          docker push prudhviraj310/ecommerce-frontend:gh-latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ~/gh_actions_project
            cd ~/gh_actions_project
            
            # 1. Kill old containers
            docker rm -f gh-frontend gh-backend gh-mysql || true
            
            # 2. Start Database
            docker run -d --name gh-mysql \
              -e MYSQL_ROOT_PASSWORD=root \
              -e MYSQL_DATABASE=ecommerce_db \
              mysql:8.0 || true
            
            # 3. Give MySQL time to start up (Prevents ECONNREFUSED)
            sleep 20
            
            # 4. Start Backend (Linked to gh-mysql)
            docker run -d --name gh-backend \
              -p 5001:5000 \
              --link gh-mysql:db-host \
              -e DB_HOST=db-host \
              -e DB_USER=root \
              -e DB_PASSWORD=root \
              -e DB_NAME=ecommerce_db \
              prudhviraj310/ecommerce-backend:gh-latest
            
            # 5. Start Frontend
            docker run -d --name gh-frontend \
              -p 3001:80 \
              prudhviraj310/ecommerce-frontend:gh-latest